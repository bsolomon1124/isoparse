name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Use bash on every runner (Git Bash ships with Windows runners). This avoids
# PowerShell's native-argument parsing quirks — e.g. pwsh can hand Go a bogus
# `.out` package when `-coverprofile=coverage.out ./...` is on the command line.
defaults:
  run:
    shell: bash

jobs:
  test:
    name: test (${{ matrix.os }} / go ${{ matrix.go }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25', '1.26']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Report coverage
        run: go tool cover -func=coverage.out | tail -n 1

  lint:
    name: lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
      - name: Check gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "gofmt differences in:"
            echo "$diff"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest
          args: --timeout=5m

  vuln:
    name: govulncheck
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
